<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8faf7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e7f7f4;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="accent1" cx="12%" cy="10%">
      <stop offset="0%" style="stop-color:#ff8b3d;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ff8b3d;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="accent2" cx="88%" cy="14%">
      <stop offset="0%" style="stop-color:#0f766e;stop-opacity:0.24" />
      <stop offset="100%" style="stop-color:#0f766e;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <circle cx="150" cy="80" r="200" fill="url(#accent1)"/>
  <circle cx="1050" cy="90" r="170" fill="url(#accent2)"/>
  
  <!-- Main content area -->
  <rect x="150" y="120" width="900" height="390" rx="40" fill="rgba(255, 255, 255, 0.78)" stroke="rgba(18, 49, 58, 0.16)" stroke-width="2"/>
  
  <!-- QR placeholder (simplified) -->
  <rect x="250" y="170" width="180" height="180" rx="20" fill="white" stroke="#ff8b3d" stroke-width="4"/>
  <g fill="#12313a" opacity="0.3">
    <rect x="270" y="190" width="30" height="30"/>
    <rect x="310" y="190" width="30" height="30"/>
    <rect x="350" y="190" width="30" height="30"/>
    <rect x="270" y="230" width="30" height="30"/>
    <rect x="350" y="230" width="30" height="30"/>
    <rect x="270" y="270" width="30" height="30"/>
    <rect x="310" y="270" width="30" height="30"/>
    <rect x="350" y="270" width="30" height="30"/>
  </g>
  
  <!-- Main text -->
  <text x="550" y="230" font-family="'Space Grotesk', sans-serif" font-size="48" font-weight="700" fill="#12313a">
    UPI QR Generator
  </text>
  
  <!-- Subtitle -->
  <text x="550" y="280" font-family="'Outfit', sans-serif" font-size="26" fill="#4f6b72">
    Create Payment QR Codes Instantly
  </text>
  
  <!-- Feature points -->
  <text x="550" y="330" font-family="'Outfit', sans-serif" font-size="18" fill="#0f766e" font-weight="600">
    ✓ Custom Amounts   ✓ Free to Use   ✓ Secure
  </text>
  
  <!-- CTA -->
  <rect x="550" y="360" width="300" height="60" rx="30" fill="#0f766e"/>
  <text x="700" y="396" font-family="'Outfit', sans-serif" font-size="20" font-weight="700" fill="#f7fffd" text-anchor="middle">
    customqramount.us.kg
  </text>
</svg>
