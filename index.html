<body>

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "UPI QR Generator",
      "url": "https://customqramount.us.kg/",
      "description": "Generate UPI QR codes with custom payment amounts.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Any"
    }
  </script>

  <header>
    <h1>UPI QR Generator</h1>
    <div class="social-links">
      <a href="https://github.com/prashant64bit" target="_blank" rel="noopener" title="GitHub">
        <i class="fab fa-github"></i>
      </a>
      <a href="https://www.linkedin.com/in/prashant-cybersecurity/" target="_blank" rel="noopener" title="LinkedIn">
        <i class="fab fa-linkedin"></i>
      </a>
      <a href="https://prashantthakur.is-a.dev" target="_blank" rel="noopener" title="Portfolio">
        <i class="fas fa-globe"></i>
      </a>
    </div>
  </header>

  <div id="editModal" class="modal">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="editModalHeading">
      <h3 id="editModalHeading">Edit Payee Details</h3>
      <label>Display Name</label>
      <input type="text" id="editName" placeholder="e.g. Prashant Thakur">

      <label>UPI ID</label>
      <input type="text" id="editUpiId" placeholder="e.g. shortageofname@okicici">

      <div class="modal-buttons">
        <button id="cancelEdit">Cancel</button>
        <button id="saveEdit">Save</button>
      </div>
    </div>
  </div>

  <main>
    <p class="hero-subtitle">Create clean payment QR codes in seconds. Enter amount, share, and get paid faster.</p>

    <section class="content-box" id="inputArea" aria-label="UPI details and amount form">
      <div class="payee-info">
        <div class="title" id="payeeName" aria-label="Payee name"></div>
        <div class="subtitle" id="upiId" aria-label="UPI ID"></div>
      </div>

      <input id="amount" type="text" inputmode="decimal"
             pattern="[0-9]*\.?[0-9]{0,2}"
             placeholder="Enter amount in INR" autocomplete="off" aria-label="Enter payment amount in INR">

      <p class="hint-text">Supports decimal amounts up to 2 digits.</p>

      <button class="edit-btn" id="editBtn" aria-label="Edit payee details">
        <i class="fas fa-pencil"></i> Edit Payee Details
      </button>
    </section>

    <button class="generate-btn" id="generateBtn" aria-label="Generate UPI QR code">Generate QR Code</button>

    <section class="qr-area" id="qrArea" style="display:none;" aria-live="polite">
      <div class="qr-box" id="qr"></div>
      <div class="scan-text">Scan to pay with any UPI app</div>
    </section>

    <button class="back-btn" id="backBtn" style="display:none;" aria-label="Go back and enter new amount">Back</button>
  </main>
